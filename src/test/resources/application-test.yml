# ============================================================
#  OCT Invoice System — Test Configuration
#  File: src/test/resources/application-test.yml
#
#  TEST-ONLY credentials below. Never use in production.
#  CI and local ./mvnw test load this file when spring.profiles.active=test.
# ============================================================

spring:
  # Use H2 in-memory database for unit tests
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA configuration for tests
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        hbm2ddl:
          default_schema: public

  # Disable Flyway for unit tests (H2 schema created by Hibernate)
  flyway:
    enabled: false

  # Mail configuration for tests
  mail:
    host: localhost
    port: 1025
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# TEST-ONLY RSA-2048 key pair (dedicated to automated tests; not a production secret)
jwt:
  private-key: 
  public-key: 
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000
  pre-auth-expiration-ms: 300000

# TEST-ONLY AES-256 key (32 chars)
encryption:
  key: TestEncryptionKey1234567890ABCDEF

app:
  security:
    mfa:
      enforce-secret-check: false

# TEST-ONLY MinIO credentials for mocked/unit tests
minio:
  endpoint: http://localhost:9000
  access-key: test-minio-access-key
  secret-key: test-minio-secret-key
  bucket: test-bucket

webhook:
  max-retries: 3
  retry-delay-ms: 1000
