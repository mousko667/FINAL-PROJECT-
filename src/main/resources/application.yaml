# ============================================================
#  OCT Invoice System — Spring Boot Configuration
#  File: src/main/resources/application.yml
# ============================================================

# ── Shared base config (all profiles) ───────────────────────
spring:
  application:
    name: oct-invoice-system

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: validate           # Flyway manages schema — Hibernate only validates
    show-sql: false
    open-in-view: false            # Prevent lazy-loading issues in controllers
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  # Flyway — automatic migrations on startup
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  # File upload limits
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

  # Jackson
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

  # i18n
  messages:
    basename: i18n/messages
    encoding: UTF-8
    use-code-as-default-message: false

  # Async (for notification listeners)
  task:
    execution:
      pool:
        core-size: 5
        max-size: 20
        queue-capacity: 100
      thread-name-prefix: oct-async-
    scheduling:
      pool:
        size: 3

# ── Server ──────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: never         # Never expose stack traces in responses
    include-stacktrace: never
    include-exception: false

# ── JWT (RS256 asymmetric signing) ───────────────────────────
# JWT_PRIVATE_KEY: Base64-encoded PKCS#8 DER RSA-2048 private key (signs tokens)
# JWT_PUBLIC_KEY:  Base64-encoded X.509 DER RSA-2048 public key  (verifies tokens)
#
# Generate key pair (run once, store private key in secrets manager):
#   openssl genrsa -out private.pem 2048
#   openssl pkcs8 -topk8 -inform PEM -outform DER -in private.pem -nocrypt | base64 -w0
#   openssl rsa -in private.pem -pubout -outform DER | base64 -w0
jwt:
  private-key: ${JWT_PRIVATE_KEY}
  public-key: ${JWT_PUBLIC_KEY}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  pre-auth-expiration-ms: ${JWT_PRE_AUTH_EXPIRATION_MS:300000}

# ── Encryption ───────────────────────────────────────────────
encryption:
  key: ${ENCRYPTION_KEY}

# ── OCR (Tess4J / Tesseract) ─────────────────────────────────
# tessdata-path: path to the Tesseract language data directory.
# In Docker, mount tessdata at /app/tessdata and set OCR_TESSDATA_PATH=/app/tessdata
# Download language packs: https://github.com/tesseract-ocr/tessdata
ocr:
  tessdata-path: ${OCR_TESSDATA_PATH:tessdata}
  language: ${OCR_LANGUAGE:fra+eng}

# ── MinIO ────────────────────────────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:MinIO}
  secret-key: ${MINIO_SECRET_KEY:dany1234}
  bucket: ${MINIO_BUCKET:oct-invoices}
  presigned-url-expiry-minutes: 15

# ── App-level mail settings (separate from spring.mail SMTP config) ─────────
app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}
  mail:
    from: ${MAIL_FROM:noreply@oct.ga}
    from-name: ${MAIL_FROM_NAME:OCT Invoice System}

# ── Actuator (health checks) ─────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
  health:
    # Mail (SMTP) is not a liveness dependency: an unreachable mail relay must not
    # make the whole application report DOWN (it only degrades notifications).
    # See KNOWN_ISSUES_REGISTRY.md — mail health DOWN caused /actuator/health 503.
    mail:
      enabled: false
  info:
    env:
      enabled: true

info:
  app:
    name: OCT Invoice System
    version: 1.0.0
    description: Système de Gestion des Factures Fournisseurs

# ── OpenAPI / Swagger ────────────────────────────────────────
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
  show-actuator: false

# ── Logging (base) ───────────────────────────────────────────
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  level:
    root: WARN
    com.oct.invoicesystem: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO

---
# ============================================================
#  DEV Profile
#  Usage: SPRING_PROFILES_ACTIVE=dev  (default for local dev)
# ============================================================
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oct_invoice_dev}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:dany}
    hikari:
      pool-name: OCT-HikariPool-Dev
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true

  # Use MailHog in dev — no real emails sent
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAILHOG_SMTP_PORT:1025}
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  security:
    mfa:
      # In dev: seeded accounts have mfa_verified=true with no real TOTP secret — allow them through.
      # In production: set enforce-secret-check: true (default) to require a real TOTP device.
      enforce-secret-check: false

minio:
  endpoint: http://localhost:9000

logging:
  level:
    com.oct.invoicesystem: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

---
# ============================================================
#  TEST Profile
#  Usage: @ActiveProfiles("test") in integration tests
#  Uses local docker-compose PostgreSQL
# ============================================================
spring:
  config:
    activate:
      on-profile: test

  task:
    execution:
      pool:
        core-size: 1
      thread-name-prefix: test-async-

  datasource:
    url: jdbc:postgresql://localhost:5432/oct_invoice_dev
    username: postgres
    password: dany

  flyway:
    enabled: true
    clean-disabled: false
    clean-on-validation-error: true  # allow clean slate in tests

  mail:
    host: localhost
    port: 1025
    username:
    password:
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Test RSA-2048 key pair — FOR TESTING ONLY, never use in production.
# Generated with: openssl genrsa 2048 | openssl pkcs8 -topk8 -nocrypt -outform DER | base64 -w0
jwt:
  private-key: 
  public-key: 
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000
  pre-auth-expiration-ms: 300000

encryption:
  key: TestEncryptionKey1234567890ABCDEF

minio:
  endpoint: http://localhost:9000
  access-key: MinIO
  secret-key: dany1234
  bucket: oct-invoices

logging:
  level:
    com.oct.invoicesystem: DEBUG
    org.flywaydb: DEBUG

---
# ============================================================
#  PROD Profile
#  Usage: SPRING_PROFILES_ACTIVE=prod (set in docker-compose)
#  All secrets come from environment variables — nothing hardcoded
# ============================================================
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      pool-name: OCT-HikariPool-Prod
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    show-sql: false

  # Real Gmail SMTP in prod
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  error:
    include-message: never
    include-stacktrace: never
  # TLS 1.3 — enforced at the application layer (not only at infrastructure/reverse-proxy level)
  # SSL_KEYSTORE_PATH:     path to PKCS12 keystore file (e.g. /run/secrets/keystore.p12)
  # SSL_KEYSTORE_PASSWORD: keystore password
  # To generate a self-signed cert for testing:
  #   keytool -genkeypair -alias oct -keyalg RSA -keysize 2048 -validity 365
  #     -storetype PKCS12 -keystore keystore.p12 -storepass <password>
  ssl:
    enabled: true
    protocol: TLSv1.3
    enabled-protocols: TLSv1.3
    key-store: ${SSL_KEYSTORE_PATH}
    key-store-password: ${SSL_KEYSTORE_PASSWORD}
    key-store-type: PKCS12

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS}

logging:
  level:
    root: WARN
    com.oct.invoicesystem: INFO
  file:
    name: /var/log/oct-invoice/app.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
