<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; color: #1f2933;">
    <h2>Password Reset</h2>
    <p>A password reset was requested for your OCT Invoice System account.</p>
    <p>This link expires in 1 hour.</p>
    <p><a th:href="${resetUrl}" style="display:inline-block;padding:10px 16px;background:#1a3a5c;color:#ffffff;text-decoration:none;border-radius:4px;">Reset Password</a></p>
    <p>If you did not request this, you can ignore this email.</p>
</body>
</html>
